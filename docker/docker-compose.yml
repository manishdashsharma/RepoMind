services:
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: zeocloud-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=WARN
    restart: unless-stopped
    networks:
      - zeocloud
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/collections || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  zeocloud:
    name: zeocloud

volumes:
  qdrant_data:
    name: zeocloud_qdrant_data
